<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Polyrhythm</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js'); });
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --surface: #f5f5f3; --border2: rgba(0,0,0,0.25);
    --text: #1a1a1a; --muted: #888;
    --teal: #1D9E75; --teal-mid: #5DCAA5; --teal-lt: #9FE1CB;
    --purple: #7F77DD; --purp-mid: #AFA9EC; --purp-lt: #CECBF6;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1a1a1a; --surface: #242424; --border2: rgba(255,255,255,0.22); --text: #f0f0f0; --muted: #888; }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  .app { max-width: 480px; margin: 0 auto;
    padding: clamp(20px,5vw,40px) clamp(16px,5vw,32px);
    display: flex; flex-direction: column; gap: 16px; }
  .top-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
  .top-btn { padding: clamp(12px,3.5vw,16px) 8px; font-size: clamp(15px,4vw,17px); font-weight: 500;
    border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text);
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: background 0.1s; }
  .top-btn:active { background: var(--surface); }
  #startBtn.on { border-color: var(--teal); color: var(--teal); }
  #tapBtn.flash { background: var(--surface); }
  .bpm-wrap { position: relative; }
  #bpmInput { width: 100%; padding: clamp(12px,3.5vw,16px) 8px; font-size: clamp(15px,4vw,17px); font-weight: 500;
    border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text);
    text-align: center; -moz-appearance: textfield; touch-action: manipulation; }
  #bpmInput::-webkit-inner-spin-button, #bpmInput::-webkit-outer-spin-button { -webkit-appearance: none; }
  .bpm-unit { position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--muted); pointer-events: none; }

  /* View switcher */
  .view-switch { display: flex; border: 1px solid var(--border2); border-radius: var(--radius);
    overflow: hidden; }
  .view-switch button { flex: 1; padding: clamp(10px,3vw,13px) 8px; font-size: clamp(13px,3.5vw,15px);
    font-weight: 500; border: none; background: var(--bg); color: var(--muted);
    cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: all 0.15s; }
  .view-switch button.active { background: var(--surface); color: var(--text); }
  .view-switch button:first-child { border-right: 1px solid var(--border2); }

  .track-row { display: flex; align-items: center; justify-content: center; gap: clamp(8px,2.5vw,14px); }
  .num-display { font-size: clamp(52px,15vw,72px); font-weight: 500; line-height: 1;
    text-align: center; min-width: clamp(56px,16vw,80px); }
  #numA { color: var(--teal); } #numB { color: var(--purple); }
  .num-btn { width: clamp(40px,11vw,52px); height: clamp(40px,11vw,52px); border-radius: 50%;
    border: 1px solid var(--border2); background: var(--bg); font-size: clamp(18px,5.5vw,24px);
    font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: center;
    justify-content: center; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    flex-shrink: 0; transition: background 0.1s; }
  .num-btn:active { background: var(--surface); }
  .div-btn { width: clamp(40px,11vw,52px); height: clamp(40px,11vw,52px); border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: var(--bg); font-size: clamp(16px,5vw,21px);
    font-weight: 500; color: var(--muted); cursor: pointer; display: flex; align-items: center;
    justify-content: center; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    flex-shrink: 0; transition: background 0.1s; }
  .div-btn:active { background: var(--surface); }
  .div-btn:disabled { opacity: 0.22; cursor: default; }
  .grid-wrap { width: 100%; overflow: hidden; }
  /* Canvas scales down to fit container when content is wider */
  #grid { display: block; transform-origin: top left; }
</style>
</head>
<body>
<div class="app">
  <div class="top-row">
    <button class="top-btn" id="startBtn">
      <svg id="startIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span id="startLabel">Start</span>
    </button>
    <div class="bpm-wrap">
      <input type="number" id="bpmInput" value="125" min="10" max="400" inputmode="numeric">
      <span class="bpm-unit">bpm</span>
    </div>
    <button class="top-btn" id="tapBtn">Tap</button>
  </div>

  <div class="view-switch">
    <button id="viewDefault" class="active">Default</button>
    <button id="viewNotation">Notation</button>
  </div>

  <div class="track-row">
    <button class="div-btn" id="aDivHalf"   aria-label="halve A"></button>
    <button class="num-btn" id="aDown"      aria-label="decrease A">−</button>
    <span   class="num-display" id="numA">4</span>
    <button class="num-btn" id="aUp"        aria-label="increase A">+</button>
    <button class="div-btn" id="aDivDouble" aria-label="double A"></button>
  </div>

  <div class="grid-wrap">
    <canvas id="grid"></canvas>
  </div>

  <div class="track-row">
    <button class="num-btn" id="bDown" aria-label="decrease B">−</button>
    <span   class="num-display" id="numB">3</span>
    <button class="num-btn" id="bUp"   aria-label="increase B">+</button>
  </div>
</div>

<script>
  let beatsA = 4, beatsB = 3, divA = 0, bpm = 125;
  let audioCtx = null, isPlaying = false, schedTimer = null, cycleStart = 0;
  let activeA = -1, activeB = -1;
  let flashQA = [], flashQB = []; // now carry {t, b, dur} for notation view
  let liveNodes = [], pending = {};
  let currentView = 'default'; // 'default' | 'notation'

  const canvas = document.getElementById('grid');
  const ctx    = canvas.getContext('2d');

  // ── TIMING ───────────────────────────────────────────────────────────────
  function beatDurA() { return (60 / bpm) * Math.pow(2, -divA); }
  function cycleDur() { return beatDurA() * beatsA; }
  function beatDurB() { return cycleDur() / beatsB; }

  // ── NOTE SVG ICONS (for div buttons) ─────────────────────────────────────
  const NOTE_SVGS = {
    minim: `<svg width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="7" cy="17" rx="6" ry="4" transform="rotate(-15 7 17)" stroke="currentColor" stroke-width="1.8" fill="none"/><line x1="12.5" y1="15.5" x2="12.5" y2="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
    crotchet: `<svg width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="7" cy="17" rx="6" ry="4" transform="rotate(-15 7 17)" fill="currentColor"/><line x1="12.5" y1="15.5" x2="12.5" y2="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
    quaver: `<svg width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="7" cy="17" rx="6" ry="4" transform="rotate(-15 7 17)" fill="currentColor"/><line x1="12.5" y1="15.5" x2="12.5" y2="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M12.5 2 C16 4, 18 7, 14 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>`,
    semiquaver: `<svg width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="7" cy="17" rx="6" ry="4" transform="rotate(-15 7 17)" fill="currentColor"/><line x1="12.5" y1="15.5" x2="12.5" y2="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M12.5 2 C16 4, 18 7, 14 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/><path d="M12.5 6 C16 8, 18 11, 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>`
  };
  const SLOWER = ['minim','minim','crotchet','quaver'];
  const FASTER = ['crotchet','quaver','semiquaver','semiquaver'];

  function updateDivUI() {
    const idx  = divA + 1;
    const half = document.getElementById('aDivHalf');
    const dbl  = document.getElementById('aDivDouble');
    half.innerHTML = NOTE_SVGS[SLOWER[idx]];
    dbl.innerHTML  = NOTE_SVGS[FASTER[idx]];
    half.disabled  = divA <= -1;
    dbl.disabled   = divA >= 2;
  }

  // ── BEAM GROUPING FOR TRACK A ─────────────────────────────────────────────
  // Returns array of group sizes for a given beat count (quaver/semiquaver speed)
  function getBeamGroups(n) {
    const map = {
      2:[2], 3:[3], 4:[4], 5:[5], 6:[3,3], 7:[2,2,3],
      8:[4,4], 9:[3,3,3], 10:[5,5], 11:[3,3,3,2],
      12:[6,6], 13:[3,3,3,4]
    };
    return map[n] || Array(n).fill(1);
  }

  // ── NOTATION HELPERS ──────────────────────────────────────────────────────
  function calcBNoteValue() {
    const ratio         = beatsA / beatsB;
    const aBeatQuarters = Math.pow(2, -divA);
    const bNoteQuarters = ratio * aBeatQuarters;

    // B is clean (no tuplet) only when beatsB/beatsA is a power of 2.
    // log2(beatsB/beatsA) must be an integer: 8/4=2✓, 4/2=2✓, 8/6≈1.33✗, 6/4=1.5✗
    const log2ratio    = Math.log2(beatsB / beatsA);
    const isCleanRatio = Math.abs(log2ratio - Math.round(log2ratio)) < 0.0001;

    if (isCleanRatio) {
      const standards = [4, 3, 2, 1.5, 1, 0.75, 0.5, 0.375, 0.25, 0.125];
      const dotted    = [false, true, false, true, false, true, false, true, false, false];
      const names     = ['whole','half','half','quarter','quarter','eighth','eighth','sixteenth','sixteenth','thirty-second'];
      for (let i = 0; i < standards.length; i++) {
        if (Math.abs(bNoteQuarters - standards[i]) < 0.0001) {
          return { quarters: standards[i], dotted: dotted[i], name: names[i], tuplet: null };
        }
      }
    }

    // Not a clean power-of-2 ratio — use tuplet with nearest plain note value
    const plain      = [4, 2, 1, 0.5, 0.25];
    const plainNames = ['whole','half','quarter','eighth','sixteenth'];
    let best = plain[0], bestName = plainNames[0];
    for (let i = 0; i < plain.length; i++) {
      if (Math.abs(plain[i] - bNoteQuarters) < Math.abs(best - bNoteQuarters)) {
        best = plain[i]; bestName = plainNames[i];
      }
    }
    return { quarters: best, dotted: false, name: bestName, tuplet: beatsB };
  }

  // ── DRAW DISPATCH ─────────────────────────────────────────────────────────
  function drawGrid() {
    if (currentView === 'default') drawDefault();
    else drawNotation();
  }

  // ── DEFAULT VIEW ──────────────────────────────────────────────────────────
  function drawDefault() {
    // Reset any styles set by the notation view
    canvas.style.width     = '100%';
    canvas.style.transform = 'none';
    canvas.style.marginBottom = '0';
    const W = canvas.offsetWidth; if (!W) return;
    const dpr = window.devicePixelRatio || 1;
    const H   = Math.round(W * 0.52);
    canvas.width = W*dpr; canvas.height = H*dpr; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    const lineY=H/2, padX=24, useW=W-padX*2, stemH=H*0.36;
    const dotR=Math.max(6,W*0.018), accentR=dotR*1.55, hitR=dotR*1.4;

    ctx.strokeStyle='rgba(128,128,128,0.28)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padX,lineY); ctx.lineTo(W-padX,lineY); ctx.stroke();

    function drawRow(beats,above,activeIdx,baseCol,accentCol,hitCol) {
      for (let i=0;i<beats;i++) {
        const x = padX+(beats>1?(i/(beats-1))*useW:useW/2);
        const isHit=i===activeIdx, isAccent=i===0;
        const r=isHit?hitR:(isAccent?accentR:dotR);
        const stemEnd=above?lineY-stemH:lineY+stemH;
        const dotY=above?stemEnd-r:stemEnd+r;
        ctx.strokeStyle='rgba(128,128,128,0.18)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(x,lineY); ctx.lineTo(x,stemEnd); ctx.stroke();
        ctx.beginPath(); ctx.arc(x,dotY,r,0,Math.PI*2);
        ctx.fillStyle=isHit?hitCol:(isAccent?accentCol:baseCol); ctx.fill();
      }
    }
    drawRow(beatsA,true, activeA,'#9FE1CB','#5DCAA5','#1D9E75');
    drawRow(beatsB,false,activeB,'#CECBF6','#AFA9EC','#7F77DD');
  }

  // ── NOTATION VIEW ─────────────────────────────────────────────────────────
  function drawNotation() {
    if (!canvas.parentElement) return;

    // ── GEOMETRY (all calculated upfront, nothing used before declared) ──────
    const containerW = canvas.parentElement.offsetWidth || 360;
    const dpr    = window.devicePixelRatio || 1;
    const u      = containerW / 32;
    const lw     = Math.max(1, containerW * 0.003);
    const thickW = lw * 4;

    const stemLen = u * 3.0;
    const headW   = u * 0.85;
    const headH   = u * 0.56;
    const beamH   = u * 0.38;
    const beamGap = u * 0.52;
    const dotRad  = u * 0.22;

    const timeSigFontSize = Math.round(u * 2.0);
    const tsWidth = u * 2.4;
    const tsGap   = u * 0.6;

    // ── STEP 1: note slot width — minimum is 6-beat equivalent width ─────────
    const maxBeats  = Math.max(beatsA, beatsB);
    const minSlotW  = headW * 2.1;
    const slotW     = Math.max(minSlotW, containerW * 0.072);
    // Enforce minimum: canvas never narrower than a 6-beat layout
    const minBeatsForWidth = 6;
    const minNoteAreaW = Math.max(minSlotW, containerW * 0.072) * minBeatsForWidth;
    const noteAreaW = Math.max(slotW * maxBeats, minNoteAreaW);

    // ── STEP 2: full system width ─────────────────────────────────────────────
    const startClusterW = thickW * 0.5 + lw * 2 + u * 0.65 + dotRad * 2 + u * 1.2;
    const endClusterW   = dotRad * 2 + u * 0.65 + lw * 2 + thickW * 0.5 + u * 0.8;
    const systemW       = startClusterW + noteAreaW + endClusterW;
    const totalW        = tsWidth + tsGap + systemW;

    // Canvas width expands if content exceeds container (grid-wrap scrolls)
    const W       = Math.max(containerW, totalW + u * 2);
    const topPad  = u * 2.0 + stemLen;
    const botPad  = u * 4.5 + stemLen;
    const lineGap = u * 3.8;
    const lineA   = topPad;            // y of Track A staff line
    const lineB   = lineA + lineGap;   // y of Track B staff line
    const H       = lineB + botPad;

    // ── STEP 3: centre the system within W ───────────────────────────────────
    const offsetX  = (W - totalW) / 2;
    const systemX  = offsetX + tsWidth + tsGap;

    // ── STEP 4: x positions ───────────────────────────────────────────────────
    const repLeftThickX = systemX;
    const repLeftThinX  = repLeftThickX + thickW * 0.5 + lw * 2;
    const startDotX     = repLeftThinX + u * 0.65;
    const noteAreaX     = startDotX + dotRad * 2 + u * 1.2;

    function noteX(i, total) {
      return noteAreaX + (i / total) * noteAreaW;
    }

    // lastNoteX: whichever track ends furthest right, but never left of where
    // the last note would be in a 6-beat minimum layout.
    const minLastNoteX = noteAreaX + ((minBeatsForWidth - 1) / minBeatsForWidth) * minNoteAreaW;
    const lastNoteX    = Math.max(
      noteX(beatsA - 1, beatsA),
      noteX(beatsB - 1, beatsB),
      minLastNoteX
    );
    const endBarThinX  = lastNoteX + headW * 2 + u * 1.2;
    const endBarThickX = endBarThinX + lw * 2 + thickW * 0.5;
    const endDotX      = endBarThinX - u * 0.65;
    const staffX2      = endBarThinX - u * 0.2;

    // Tuplet moustache geometry (below B stems)
    const stemBotY   = lineB + stemLen;
    const moustacheY = stemBotY + u * 0.6;
    const moustacheH = u * 0.9;
    const tupNumY    = moustacheY + moustacheH + u * 0.4;

    // Colours
    const isDark   = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const inkCol   = isDark ? '#f0f0f0' : '#1a1a1a';
    const mutedCol = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.18)';
    const hitColA  = '#1D9E75';
    const hitColB  = '#7F77DD';
    const baseCol  = isDark ? 'rgba(240,240,240,0.85)' : 'rgba(26,26,26,0.85)';

    // ── CANVAS SETUP ─────────────────────────────────────────────────────────
    canvas.width        = W * dpr;
    canvas.height       = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    // Scale down to fit container if canvas is wider than container
    const scale = W > containerW ? containerW / W : 1;
    canvas.style.transform      = `scale(${scale})`;
    canvas.style.marginBottom   = scale < 1 ? (H * scale - H) + 'px' : '0';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // ── TIME SIGNATURE ───────────────────────────────────────────────────────
    const timeSigTop    = beatsA;
    const timeSigBottom = Math.pow(2, divA + 2);
    ctx.fillStyle    = inkCol;
    ctx.font         = `bold ${timeSigFontSize}px "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    const tsCX   = offsetX + tsWidth / 2;
    const tsTopY = lineA + (lineB - lineA) * 0.22;
    const tsBotY = lineA + (lineB - lineA) * 0.78;
    ctx.fillText(String(timeSigTop),    tsCX, tsTopY);
    ctx.fillText(String(timeSigBottom), tsCX, tsBotY);

    // ── START REPEAT BARLINE: thick → thin → dots ────────────────────────────
    ctx.strokeStyle = inkCol;
    ctx.fillStyle   = inkCol;
    ctx.lineWidth   = thickW;
    ctx.beginPath(); ctx.moveTo(repLeftThickX, lineA); ctx.lineTo(repLeftThickX, lineB); ctx.stroke();
    ctx.lineWidth   = lw;
    ctx.beginPath(); ctx.moveTo(repLeftThinX, lineA);  ctx.lineTo(repLeftThinX, lineB);  ctx.stroke();
    ctx.beginPath(); ctx.arc(startDotX, lineA + (lineB - lineA) * 0.36, dotRad, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(startDotX, lineA + (lineB - lineA) * 0.64, dotRad, 0, Math.PI * 2); ctx.fill();

    // ── END REPEAT BARLINE: dots → thin → thick ──────────────────────────────
    ctx.lineWidth   = lw;
    ctx.beginPath(); ctx.moveTo(endBarThinX,  lineA); ctx.lineTo(endBarThinX,  lineB); ctx.stroke();
    ctx.lineWidth   = thickW;
    ctx.beginPath(); ctx.moveTo(endBarThickX, lineA); ctx.lineTo(endBarThickX, lineB); ctx.stroke();
    ctx.lineWidth   = lw;
    ctx.beginPath(); ctx.arc(endDotX, lineA + (lineB - lineA) * 0.36, dotRad, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(endDotX, lineA + (lineB - lineA) * 0.64, dotRad, 0, Math.PI * 2); ctx.fill();

    // ── STAFF LINES — extend from start barline to just before end barline ───
    ctx.strokeStyle = mutedCol;
    ctx.lineWidth   = lw * 0.8;
    ctx.beginPath(); ctx.moveTo(repLeftThickX, lineA); ctx.lineTo(staffX2, lineA); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(repLeftThickX, lineB); ctx.lineTo(staffX2, lineB); ctx.stroke();

    // ── DRAWING HELPERS ───────────────────────────────────────────────────────

    function drawHead(x, y, open, hitCol, hit) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-0.2);
      ctx.beginPath();
      ctx.ellipse(0, 0, headW, headH, 0, 0, Math.PI * 2);
      if (open) {
        ctx.strokeStyle = hit ? hitCol : baseCol;
        ctx.lineWidth   = lw * 1.8;
        ctx.stroke();
      } else {
        ctx.fillStyle = hit ? hitCol : baseCol;
        ctx.fill();
      }
      ctx.restore();
    }

    function drawAugDot(x, y) {
      ctx.beginPath();
      ctx.arc(x + headW + dotRad * 1.4, y - headH * 0.3, dotRad, 0, Math.PI * 2);
      ctx.fillStyle = inkCol;
      ctx.fill();
    }

    function drawBeamGroupA(notes, beamCount, activeIdx, hitCol) {
      if (!notes.length) return;
      const topY   = lineA - stemLen;
      const stemX  = n => n.x + headW;
      notes.forEach(n => {
        const hit = n.beat === activeIdx;
        drawHead(n.x, lineA, false, hitCol, hit);
        ctx.strokeStyle = hit ? hitCol : baseCol;
        ctx.lineWidth   = lw * 1.5;
        ctx.beginPath();
        ctx.moveTo(stemX(n), lineA);
        ctx.lineTo(stemX(n), topY);
        ctx.stroke();
      });
      if (notes.length > 1) {
        const x1 = stemX(notes[0]);
        const x2 = stemX(notes[notes.length - 1]);
        ctx.fillStyle = baseCol;
        if (beamCount === 3) {
          // quaver at outer, semiquaver next, demisemiquaver squeezed between them
          ctx.fillRect(x1, topY,                                  x2 - x1, beamH); // quaver
          ctx.fillRect(x1, topY + (beamH + beamGap),              x2 - x1, beamH); // semiquaver
          ctx.fillRect(x1, topY + (beamH + beamGap) * 0.5,        x2 - x1, beamH); // demisemi (between)
        } else {
          for (let b = 0; b < beamCount; b++) {
            ctx.fillRect(x1, topY + b * (beamH + beamGap), x2 - x1, beamH);
          }
        }
      }
    }

    function drawBeamGroupB(notes, beamCount, activeIdx, hitCol, open) {
      if (!notes.length) return;
      const botY  = lineB + stemLen;
      const stemX = n => n.x - headW;
      notes.forEach(n => {
        const hit = n.beat === activeIdx;
        drawHead(n.x, lineB, open, hitCol, hit);
        if (!open) {
          ctx.strokeStyle = hit ? hitCol : baseCol;
          ctx.lineWidth   = lw * 1.5;
          ctx.beginPath();
          ctx.moveTo(stemX(n), lineB);
          ctx.lineTo(stemX(n), botY);
          ctx.stroke();
        }
      });
      if (notes.length > 1 && !open) {
        const x1 = stemX(notes[0]);
        const x2 = stemX(notes[notes.length - 1]);
        ctx.fillStyle = baseCol;
        if (beamCount === 3) {
          // quaver at outer, semiquaver next, demisemiquaver squeezed between them
          ctx.fillRect(Math.min(x1,x2), botY - beamH,                                   Math.abs(x2-x1), beamH); // quaver
          ctx.fillRect(Math.min(x1,x2), botY - beamH - (beamH + beamGap),               Math.abs(x2-x1), beamH); // semiquaver
          ctx.fillRect(Math.min(x1,x2), botY - beamH - (beamH + beamGap) * 0.5,         Math.abs(x2-x1), beamH); // demisemi (between)
        } else {
          for (let b = 0; b < beamCount; b++) {
            ctx.fillRect(Math.min(x1, x2), botY - beamH - b * (beamH + beamGap), Math.abs(x2 - x1), beamH);
          }
        }
      }
    }

    function drawTuplet(x1, x2, number) {
      // Offset slightly left so bracket sits under note stems rather than noteheads
      const shift = u * 0.5;
      const lx1   = x1 - shift;
      const lx2   = x2 - shift;
      const midX  = (lx1 + lx2) / 2;
      const tipY  = moustacheY + moustacheH;
      const baseY = moustacheY;
      const cpIn  = moustacheH * 1.1;

      ctx.strokeStyle = inkCol;
      ctx.lineWidth   = lw * 1.2;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(lx1, baseY);
      ctx.bezierCurveTo(lx1, baseY + cpIn, midX - u * 0.4, tipY, midX, tipY - u * 0.1);
      ctx.bezierCurveTo(midX + u * 0.4, tipY, lx2, baseY + cpIn, lx2, baseY);
      ctx.stroke();
      ctx.lineCap = 'butt';

      ctx.fillStyle    = inkCol;
      ctx.font         = `italic ${Math.round(u * 1.6)}px Georgia, "Times New Roman", serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(String(number), midX, tupNumY);
    }

    // ── ALIGNMENT LINES (drawn first so noteheads render on top) ─────────────
    const isSyncNow = activeA !== -1 && activeB !== -1
      && activeATime > 0 && activeBTime > 0
      && Math.abs(activeATime - activeBTime) < 0.015;

    for (let iA = 0; iA < beatsA; iA++) {
      for (let iB = 0; iB < beatsB; iB++) {
        if (iA * beatsB !== iB * beatsA) continue;
        const xA = noteX(iA, beatsA);
        const xB = noteX(iB, beatsB);
        const x  = (xA + xB) / 2;
        const lineTop = lineA + headH;
        const lineBot = lineB - headH;
        const isSyncLine = isSyncNow && iA === activeA && iB === activeB;
        ctx.save();
        ctx.strokeStyle = 'rgba(160,160,160,0.35)';
        ctx.lineWidth   = isSyncLine ? lw * 2.5 : lw * 1.0;
        ctx.setLineDash([lw * 2.5, lw * 2.5]);
        ctx.beginPath(); ctx.moveTo(x, lineTop); ctx.lineTo(x, lineBot); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    // ── TRACK A NOTES ─────────────────────────────────────────────────────────
    const isSemiA  = divA === 2;
    const isQuavA  = divA >= 1;
    const isMinA   = divA === -1;
    const beamCntA = divA === 1 ? 1 : divA === 2 ? 2 : 1; // quaver=1, semiquaver=2

    if (!isQuavA) {
      for (let i = 0; i < beatsA; i++) {
        const x   = noteX(i, beatsA);
        const hit = i === activeA;
        drawHead(x, lineA, isMinA, hitColA, hit);
        ctx.strokeStyle = hit ? hitColA : baseCol;
        ctx.lineWidth   = lw * 1.5;
        ctx.beginPath();
        ctx.moveTo(x + headW, lineA);          // flush right of notehead
        ctx.lineTo(x + headW, lineA - stemLen);
        ctx.stroke();
      }
    } else {
      const groups = getBeamGroups(beatsA);
      let bi = 0;
      groups.forEach(sz => {
        const notes = [];
        for (let g = 0; g < sz; g++) { notes.push({ x: noteX(bi, beatsA), beat: bi }); bi++; }
        drawBeamGroupA(notes, beamCntA, activeA, hitColA);
      });
    }

    // ── TRACK B NOTES ─────────────────────────────────────────────────────────
    const bInfo        = calcBNoteValue();
    const bIsSemi      = bInfo.name === 'sixteenth' || bInfo.name === 'thirty-second';
    const bIsBeamed    = bInfo.name === 'eighth' || bIsSemi;
    const bIsOpen      = bInfo.name === 'half'   || bInfo.name === 'whole';
    const bIsWhole     = bInfo.name === 'whole';
    const bNeedsTuplet = bInfo.tuplet !== null;
    const beamCntB     = bInfo.name === 'thirty-second' ? 3
                       : bInfo.name === 'sixteenth'     ? 2
                       : 1; // eighth = 1 beam

    // Beam groups: tuplet → one group (except B=12 → two groups of 6); else Track A rules
    const bGroups = bNeedsTuplet
      ? (beatsB === 12 ? [6, 6] : [beatsB])
      : getBeamGroups(beatsB);

    const allBNoteXs = [];

    if (!bIsBeamed && !bIsOpen) {
      // Individual crotchets (or dotted variants)
      for (let i = 0; i < beatsB; i++) {
        const x   = noteX(i, beatsB);
        const hit = i === activeB;
        drawHead(x, lineB, false, hitColB, hit);
        ctx.strokeStyle = hit ? hitColB : baseCol;
        ctx.lineWidth   = lw * 1.5;
        ctx.beginPath();
        ctx.moveTo(x - headW, lineB);          // flush left of notehead
        ctx.lineTo(x - headW, lineB + stemLen);
        ctx.stroke();
        if (bInfo.dotted) drawAugDot(x, lineB);
        allBNoteXs.push(x);
      }
    } else if (bIsOpen) {
      // Minim or whole note — no stem for whole, open head
      for (let i = 0; i < beatsB; i++) {
        const x   = noteX(i, beatsB);
        const hit = i === activeB;
        drawHead(x, lineB, true, hitColB, hit);
        if (!bIsWhole) {
          ctx.strokeStyle = hit ? hitColB : baseCol;
          ctx.lineWidth   = lw * 1.5;
          ctx.beginPath();
          ctx.moveTo(x - headW, lineB);        // flush left of notehead
          ctx.lineTo(x - headW, lineB + stemLen);
          ctx.stroke();
        }
        if (bInfo.dotted) drawAugDot(x, lineB);
        allBNoteXs.push(x);
      }
    } else {
      // Beamed (quaver or semiquaver)
      let bi = 0;
      bGroups.forEach(sz => {
        const notes = [];
        for (let g = 0; g < sz; g++) {
          const x = noteX(bi, beatsB);
          notes.push({ x, beat: bi });
          allBNoteXs.push(x);
          bi++;
        }
        drawBeamGroupB(notes, beamCntB, activeB, hitColB, false);
      });
    }

    // ── TUPLET BRACKET ────────────────────────────────────────────────────────
    if (bNeedsTuplet && allBNoteXs.length > 0) {
      if (beatsB === 12) {
        const half = 6;
        drawTuplet(allBNoteXs[0] - headW,    allBNoteXs[half - 1] + headW, 6);
        drawTuplet(allBNoteXs[half] - headW, allBNoteXs[11] + headW,       6);
      } else {
        drawTuplet(allBNoteXs[0] - headW, allBNoteXs[allBNoteXs.length - 1] + headW, bInfo.tuplet);
      }
    }
  }

  // ── AUDIO ─────────────────────────────────────────────────────────────────
  function playClick(time, freq, gain) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
    o.start(time); o.stop(time + 0.1);
    liveNodes.push(o);
  }

  function scheduleCycle(start) {
    const dA = beatDurA(), dB = cycleDur() / beatsB;
    for (let i = 0; i < beatsA; i++) {
      const t = start + i * dA;
      playClick(t, 1200, i === 0 ? 0.55 : 0.28);
      flashQA.push({ t, b: i, dur: dA });
    }
    for (let i = 0; i < beatsB; i++) {
      const t = start + i * dB;
      playClick(t, 480, i === 0 ? 0.42 : 0.20);
      flashQB.push({ t, b: i, dur: dB });
    }
  }

  function applyPending() {
    let changed = false;
    if ('bpm'    in pending) { bpm    = pending.bpm;    delete pending.bpm;    document.getElementById('bpmInput').value = bpm; changed = true; }
    if ('beatsA' in pending) { beatsA = pending.beatsA; delete pending.beatsA; document.getElementById('numA').textContent = beatsA; changed = true; }
    if ('beatsB' in pending) { beatsB = pending.beatsB; delete pending.beatsB; document.getElementById('numB').textContent = beatsB; changed = true; }
    if ('divA'   in pending) { divA   = pending.divA;   delete pending.divA;   updateDivUI(); changed = true; }
    if (changed) drawGrid();
  }

  function scheduleLoop() {
    const now = audioCtx.currentTime;
    while (cycleStart < now + 0.3) {
      applyPending();
      scheduleCycle(cycleStart);
      cycleStart += cycleDur();
    }
    schedTimer = setTimeout(scheduleLoop, 100);
  }

  // ── FLASH LOOP ────────────────────────────────────────────────────────────
  // For notation view: notes stay lit for their full duration (derived at render time)
  // We store activeA/activeB as {beat, until} in notation mode
  let activeAUntil = 0, activeBUntil = 0;
  let activeATime  = -1, activeBTime  = -1; // audio time each beat fired

  function flashLoop() {
    if (audioCtx && isPlaying) {
      const now     = audioCtx.currentTime;
      // Default view uses a short fixed flash; notation view uses full note duration
      const flashDur = currentView === 'default' ? 0.10 : null;
      let changed = false;

      while (flashQA.length && flashQA[0].t <= now) {
        const ev = flashQA.shift();
        activeA      = ev.b;
        activeAUntil = ev.t + (flashDur !== null ? flashDur : ev.dur - 0.01);
        activeATime  = ev.t;
        changed = true;
      }
      if (activeA !== -1 && now >= activeAUntil) { activeA = -1; activeATime = -1; changed = true; }

      while (flashQB.length && flashQB[0].t <= now) {
        const ev = flashQB.shift();
        activeB      = ev.b;
        activeBUntil = ev.t + (flashDur !== null ? flashDur : ev.dur - 0.01);
        activeBTime  = ev.t;
        changed = true;
      }
      if (activeB !== -1 && now >= activeBUntil) { activeB = -1; activeBTime = -1; changed = true; }

      if (changed) drawGrid();
    }
    requestAnimationFrame(flashLoop);
  }

  // ── TRANSPORT ─────────────────────────────────────────────────────────────
  async function startPlay() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    isPlaying = true;
    flashQA = []; flashQB = [];
    activeA = -1; activeB = -1; activeAUntil = 0; activeBUntil = 0;
    activeATime = -1; activeBTime = -1;
    liveNodes = [];
    cycleStart = audioCtx.currentTime + 0.05;
    scheduleLoop();
    document.getElementById('startBtn').classList.add('on');
    document.getElementById('startLabel').textContent = 'Stop';
    document.getElementById('startIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  }

  function stopPlay() {
    isPlaying = false;
    clearTimeout(schedTimer);
    const now = audioCtx ? audioCtx.currentTime : 0;
    liveNodes.forEach(o => { try { o.stop(now); } catch(e) {} });
    liveNodes = [];
    flashQA = []; flashQB = [];
    activeA = -1; activeB = -1; activeATime = -1; activeBTime = -1;
    document.getElementById('startBtn').classList.remove('on');
    document.getElementById('startLabel').textContent = 'Start';
    document.getElementById('startIcon').innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    drawGrid();
  }

  // ── VIEW SWITCH ───────────────────────────────────────────────────────────
  document.getElementById('viewDefault').addEventListener('click', () => {
    currentView = 'default';
    document.getElementById('viewDefault').classList.add('active');
    document.getElementById('viewNotation').classList.remove('active');
    drawGrid();
  });
  document.getElementById('viewNotation').addEventListener('click', () => {
    currentView = 'notation';
    document.getElementById('viewNotation').classList.add('active');
    document.getElementById('viewDefault').classList.remove('active');
    drawGrid();
  });

  // ── CONTROLS ──────────────────────────────────────────────────────────────
  document.getElementById('startBtn').addEventListener('click', () => { isPlaying ? stopPlay() : startPlay(); });

  document.getElementById('bpmInput').addEventListener('change', e => {
    let v = parseInt(e.target.value);
    if (isNaN(v)) v = 125;
    v = Math.max(10, Math.min(400, v));
    e.target.value = v;
    if (isPlaying) { pending.bpm = v; } else { bpm = v; }
  });

  let tapTimes = [];
  document.getElementById('tapBtn').addEventListener('click', () => {
    const now = performance.now();
    tapTimes = tapTimes.filter(t => now - t < 4000);
    tapTimes.push(now);
    if (tapTimes.length >= 4) {
      const gaps = [];
      for (let i = 1; i < tapTimes.length; i++) gaps.push(tapTimes[i] - tapTimes[i-1]);
      const avg = gaps.reduce((a,b) => a+b) / gaps.length;
      const v = Math.round(Math.max(10, Math.min(400, 60000 / avg)));
      document.getElementById('bpmInput').value = v;
      if (isPlaying) { pending.bpm = v; } else { bpm = v; }
    }
    const btn = document.getElementById('tapBtn');
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 80);
  });

  function setA(v) {
    v = Math.max(2, Math.min(13, v));
    document.getElementById('numA').textContent = v;
    if (isPlaying) { pending.beatsA = v; } else { beatsA = v; drawGrid(); }
  }
  function setB(v) {
    v = Math.max(2, Math.min(13, v));
    document.getElementById('numB').textContent = v;
    if (isPlaying) { pending.beatsB = v; } else { beatsB = v; drawGrid(); }
  }

  document.getElementById('aUp').addEventListener('click',   () => setA((pending.beatsA ?? beatsA) + 1));
  document.getElementById('aDown').addEventListener('click', () => setA((pending.beatsA ?? beatsA) - 1));
  document.getElementById('bUp').addEventListener('click',   () => setB((pending.beatsB ?? beatsB) + 1));
  document.getElementById('bDown').addEventListener('click', () => setB((pending.beatsB ?? beatsB) - 1));

  document.getElementById('aDivHalf').addEventListener('click', () => {
    const next = (pending.divA ?? divA) - 1;
    if (next >= -1) {
      if (isPlaying) { pending.divA = next; } else { divA = next; }
      const p = pending.divA ?? divA;
      const half = document.getElementById('aDivHalf'), dbl = document.getElementById('aDivDouble');
      half.innerHTML = NOTE_SVGS[SLOWER[p+1]]; dbl.innerHTML = NOTE_SVGS[FASTER[p+1]];
      half.disabled = p <= -1; dbl.disabled = p >= 2;
      // Redraw notation immediately using preview divA value
      if (currentView === 'notation') {
        const saved = divA;
        divA = p;
        drawGrid();
        if (isPlaying) divA = saved; // restore — audio will apply at cycle boundary
      }
    }
  });
  document.getElementById('aDivDouble').addEventListener('click', () => {
    const next = (pending.divA ?? divA) + 1;
    if (next <= 2) {
      if (isPlaying) { pending.divA = next; } else { divA = next; }
      const p = pending.divA ?? divA;
      const half = document.getElementById('aDivHalf'), dbl = document.getElementById('aDivDouble');
      half.innerHTML = NOTE_SVGS[SLOWER[p+1]]; dbl.innerHTML = NOTE_SVGS[FASTER[p+1]];
      half.disabled = p <= -1; dbl.disabled = p >= 2;
      if (currentView === 'notation') {
        const saved = divA;
        divA = p;
        drawGrid();
        if (isPlaying) divA = saved;
      }
    }
  });

  window.addEventListener('resize', drawGrid);
  updateDivUI();
  drawGrid();
  requestAnimationFrame(flashLoop);
</script>
</body>
</html>
